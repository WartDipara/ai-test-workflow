# 复制为 config/settings.yaml 后填写；api_key 可用 ${ENV_NAME} 从环境变量读取
llm:
  base_url: "https://api.deepseek.com"
  api_key: "${DEEPSEEK_API_KEY}"
  model_name: "deepseek-v4-flash"

# 仅当 llm / llm_multimodal 的 model 为 DeepSeek 官方模型时使用（主脑也可换成 gpt-4o 等，此时可忽略本段）
deepseek:
  thinking: true
  reasoning_effort: high    # high | max
  tool_calls_strict: false  # https://api-docs.deepseek.com/zh-cn/guides/tool_calls

# 观察者启动前多模态探针（测的是 llm_multimodal，与主脑 llm 无关）
observer:
  skip_vision_probe: false

# 多模态画面：ScreenInterpreter / check_in_game、失败恢复 analyze_screen
llm_multimodal:
  base_url: "https://ai.14x.cn/coding/v1"
  api_key: "${QWEN_API_KEY}"
  model_name: "model/qwen3.6-plus"

adb:
  # 留空或 null 表示使用默认设备（adb 未指定 -s 时）
  serial: null

ocr:
  model_profile: v6_tiny
  max_image_width: 720
  device_policy: auto
  gpu_id: 0
  allow_gpu_fallback_to_cpu: true
  warmup_on_start: false

# MolmoPoint 深度学习 checkbox 定位（留空 base_url 则仅用 OCR 左推）
molmopoint:
  base_url: ""   # 例: "http://192.168.1.10:8000"
  enabled: true
  timeout_s: 60
  prompt: "point the checkbox"
  max_vertical_offset_ratio: 0.55
  min_left_of_text_px: 4
  max_left_of_text_px: 400

executor:
  post_launch_wait_s: 2.0
  credential_fill_settle_s: 0.4
  dismiss_keyboard_after_password: true   # 作为提交策略之一，非唯一手段
  dismiss_keyboard_press_back: false
  login_submit_press_enter: true
  use_cached_login_button_xy: true
  credential_verify_after_fill: true      # 填表后无障碍回读校验位置与内容
  credential_fill_max_distance_px: 150    # 节点中心与 OCR 点击点最大允许距离
  credential_fill_retry_on_verify_fail: true
  server_selector_check_enabled: true   # false：跳过区服列表弹窗验证节点
  server_panel_fusion_enabled: true     # 区服 tap 后 OCR+多模态融合判定弹窗

# LangGraph 进游戏：轮次上限与无进展熔断（省略则使用下列默认值）
launch_graph:
  max_node_attempts: 3
  max_graph_iterations: 120
  max_free_rounds: 8
  max_free_no_progress_rounds: 3
  max_free_same_action: 2
  max_dynamic_rounds: 8
  max_dynamic_no_progress: 3
  max_dynamic_step_attempts: 2
  max_stability_observe_rounds: 16
  max_adaptive_rounds: 12
  max_adaptive_no_progress: 3
  max_adaptive_replan: 3
  adaptive_min_confidence: 0.55

game:
  # 包名/启动 Activity 由 TaskRuntime 从 APK 解析，勿写入本文件
  timeout_s: 1200.0
  package_install_wait_timeout_s: 120.0
  package_install_poll_interval_s: 2.0
  # AI 判定「已进入游戏内」（进程已起之后）
  main_screen_confirm_rounds: 2
  main_screen_min_confidence: 0.75
  # 确认进入游戏后观察加速的秒数，随后 force-stop 游戏
  normal_exit_observe_s: 10.0
  session_poll_interval_s: 1.5
  session_absent_threshold_s: 2.0
  clear_logcat_on_session_restart: true
  max_session_restarts: 0
  # OpenCV 连拍脉冲：Session Agent（点进入游戏后）与局内 in_game_agent 阶段可用
  motion_probe:
    enabled: true
    frame_count: 10
    interval_s: 0.5
    save_heatmaps: true
    pulse_min_area: 200
    motion_min_area: 800
    ocr_fuse_radius_px: 120
    always_burst: false
    burst_on_forced_guidance: true
    burst_on_no_progress: true
    hsv_yellow_boost: true
    fast_loop_enabled: false
    fast_loop_max_frames: 15
    fast_loop_interval_s: 0.1
  scene_labels:
    enabled: true
    min_retrieve_similarity: 0.35
    min_learn_confidence: 0.45
    max_known_labels_in_prompt: 20
    bootstrap_legacy_archetypes: true
  in_game_success_confirm_rounds: 2
  in_game_success_min_confidence: 0.75
  in_game_fail_confirm_rounds: 2
  in_game_fail_min_confidence: 0.75
  in_game_vlm_no_progress_fail_rounds: 10
  in_game_vlm_progress_min_confidence: 0.55
  in_game_post_action_vlm_analyze: true
  in_game_fast_path_enabled: true
  dialogue_dim_tap:
    stall_threshold: 2
    dark_percentile: 40
    ocr_exclude_margin_px: 24
    min_region_area_ratio: 0.05
    save_annotate: true

external_services:
  gameturbo:
    enabled: false   # true 时启用 GameTurbo 外部插件（bootstrap/deploy/log/Modify）

gameturbo:
  # gid / game_config_path / source_apk 由 TaskRuntime 按任务维护
  deploy_timeout_s: 900.0
  deploy_max_ai_retries: 3   # deploy 失败后 AI 读 deploy.log 并重试（含首次）的次数
  modify_patch_max_llm_retries: 3   # Modify 生成补丁时 LLM 请求失败的重试次数（含首次）
  # Windows 下 deploy.sh 需要 Git Bash；留空自动探测，或填写例如 C:/Program Files/Git/bin/bash.exe
  bash_path: ""
  # 单次任务最终产出：run_outputs/{gid}_{task_id}/（核心 result.json；插件开启时另有 merged config 等）
  run_outputs_dir: "./run_outputs"

# 登录填表（复制 config/credentials.example.yaml 为 credentials.yaml，勿提交 git）
credentials:
  file_path: "./credentials.yaml"   # 亦可 ./config/credentials.yaml

# 并行阶段网络异常：OCR+多模态（运行期不分析日志规则）
network_anomaly:
  enabled: true
  poll_interval_s: 5.0
  require_multimodal_confirm: true
  download_progress_stall_s: 90.0
  use_ocr_poll: true
  exclude_top_ratio: 0.15

# 并行阶段前台守护：点击跳转浏览器等导致失焦时自动 am start 切回
foreground_guard:
  enabled: true
  poll_interval_s: 10.0
  max_recoveries: 5
  recover_verify_delay_s: 1.5
  allowed_foreground_packages:
    - com.android.systemui

# 流水线模块开关（便于单独测试）
modules:
  executor: true           # Driver：LangGraph 进游戏流程（与 monitors 并行）
  log_monitor: true        # GameTurbo logcat 仅采集写入 gameturbo.log
  retry_on_failure: true   # true：网络类 E2xxx 失败后 Modify+deploy 重试；false：仅失败收尾
  max_retries: 3           # retry_on_failure 为 true 时生效

agent:
  artifacts_dir: "./artifacts"

logging:
  level: "INFO"
  enable_run_audit: true
  enable_process_log_file: true
  enable_pipeline_trace: true
  pipeline_trace_verbose: true
